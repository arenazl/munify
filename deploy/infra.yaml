# Contrato de config de nube munify -> Infra. Value-free (solo nombres/refs).
schema: 1
app: { id: munify, repo: arenazl/munify, gcp_project: munify-api, region: us-east4 }

backend:
  runtime: cloudrun
  source_dir: backend
  health_path: /health
  secrets:                      # SOLO NOMBRES (valores en Secret Manager, los pone Infra)
    - DATABASE_URL
    - SECRET_KEY
    - ADMIN_OPS_KEY

frontend:
  host: netlify
  source_dir: frontend
  backend_binding:
    mode: proxy_same_origin
    build_input: BACKEND_ORIGIN       # env del site, por ambiente; la setea Infra
    generator: frontend/scripts/gen-redirects.mjs
    fail_closed: true

environments:
  prod:
    branch: master
    backend_service: munify-api
    backend_origin: https://munify-api-1060106389361.us-east4.run.app
    netlify_site: reclamos-mun
    ambiente_marker: prod
    ambiente_db_esperado: sugerenciasmun      # _ambiente.db_name_esperado (nombre real de la DB de prod)
  qa:
    branch: qa
    backend_service: munify-api-qa
    backend_origin: https://munify-api-qa-vmpxsxe7ra-uk.a.run.app
    netlify_site: munify-qa
    ambiente_marker: qa
    ambiente_db_esperado: sugerenciasmun-qa   # _ambiente.db_name_esperado (nombre real de la DB de qa)
    secret_overrides: { DATABASE_URL: DATABASE_URL_QA, SECRET_KEY: SECRET_KEY_QA }

per_env_suffix: _QA

# Datos que consume el gate 15-verify (ambiente qa):
verify:
  front_url: https://munify-qa.netlify.app
  own_backend_host: munify-api-qa-vmpxsxe7ra-uk.a.run.app
  forbidden_host: munify-api-1060106389361

# La tabla marcador _ambiente (la crea/lee el modulo /admin/ops) tiene 2 campos que Infra siembra por
# ambiente: entorno (= ambiente_marker) y db_name_esperado (= ambiente_db_esperado). El guardarraiz del
# modulo aborta cualquier op que muta si el marcador no coincide con el nombre real de la DB.

# Tablas que Infra PUEDE refrescar prod->qa (bulk SQL one-way, target siempre *-qa). Operatoria RECURRENTE
# (traer datos reales a qa para probar lotes). NO incluir tablas que aun no existen en prod (ej. poi_tipos,
# puntos_interes) — esas se llenan con seed, no con refresh.
# Formato por tabla: { table, tenant } donde `tenant` es el WHERE para el modo "bajame municipio X" (:muni lo
# reemplaza Infra; en modo bulk se ignora). Verificado contra los modelos: reclamos/ordenes_trabajo/
# tesoreria_cajas tienen municipio_id propio; reclamo_personas es hija de reclamos (sin municipio_id) -> subquery.
data_refresh:
  - { table: reclamos,         tenant: "municipio_id = :muni" }
  - { table: reclamo_personas, tenant: "reclamo_id IN (SELECT id FROM reclamos WHERE municipio_id = :muni)" }
  - { table: ordenes_trabajo,  tenant: "municipio_id = :muni" }
  - { table: tesoreria_cajas,  tenant: "municipio_id = :muni" }
# Sacadas tesoreria_contactos / tesoreria_gastos: Infra midio que NO existen en prod (16-refresh dry-run,
# MSG-20260706-0450) -> no hay nada que traer; en qa se llenan por seed.
