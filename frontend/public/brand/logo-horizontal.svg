<?xml version="1.0" encoding="UTF-8"?>
<!--
  Munify — version horizontal (simbolo + wordmark al lado).
  Para header, sidebar expandido, landing.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" fill="none">
  <!-- Mark a la izquierda -->
  <g transform="translate(0 0)">
    <path d="M12 52 V 16 L 32 36" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M52 52 V 16 L 32 36" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="36" r="4" fill="#3b82f6"/>
  </g>
  <!-- Wordmark a la derecha, baseline alineada al mark -->
  <text x="76" y="44"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="32" font-weight="700" letter-spacing="-1"
        fill="#3b82f6">Munify</text>
</svg>
