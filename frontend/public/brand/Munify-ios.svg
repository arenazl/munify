<?xml version="1.0" encoding="UTF-8"?>
<!-- Variante iOS: fondo azul oscuro brand + M blanca + tilde verde.
     Centrada con padding 12% en cada lado (safe area iOS).
     Apple no aplica masks ni efectos sobre apple-touch-icon. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1800">
  <defs>
    <style>
      .cls-bg { fill: #112a6c; }
      .cls-body { fill: #ffffff; }
      .cls-check { fill: #18a24d; }
    </style>
  </defs>
  <!-- Fondo azul brand, ocupa todo el viewBox cuadrado -->
  <rect class="cls-bg" x="0" y="0" width="1800" height="1800"/>
  <!-- Logo centrado: el SVG original es 1446.79 × 1426. Lo centramos
       dentro del cuadrado de 1800 con offset (1800-1446.79)/2 = 176.6
       y (1800-1426)/2 = 187. -->
  <g transform="translate(176.6, 187)">
    <polygon class="cls-body" points="1271.65 371.24 1271.65 1069.5 635.82 1426 0 1069.5 0 356.5 635.82 0 1128.59 276.29 1000.48 381.26 636.9 177.4 160.18 444.69 160.18 979.27 636.9 1246.56 1113.62 979.27 1113.62 544.87 1271.65 371.24"/>
    <polygon class="cls-check" points="1446.79 79.97 1225.77 330.78 1113.62 458.05 644.86 989.99 448.06 781.76 448.06 568.98 637.63 759.38 1052.94 410.67 1179.19 304.66 1446.79 79.97"/>
    <polygon class="cls-body" points="404.64 517.83 404.64 1037.89 253.8 953.49 253.8 500.38 332.09 454.86 404.64 517.83"/>
    <polygon class="cls-body" points="1020.14 650.78 1020.14 954.08 867.22 1039.31 868.09 818.95 1020.14 650.78"/>
  </g>
</svg>
