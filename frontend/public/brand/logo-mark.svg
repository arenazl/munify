<?xml version="1.0" encoding="UTF-8"?>
<!--
  Munify — logo mark only.
  Concepto: "M" minimalista, geometrica. 4 trazos limpios.
  Un punto en el centro conecta las dos columnas internas:
  guino al "puente / conexion" pero sin perder la M.
  Color unico: brand #3b82f6.
  Optimizado para escalar de favicon (16px) a app icon (1024px).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Pierna izquierda -->
  <path d="M12 52 V 16 L 32 36" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pierna derecha -->
  <path d="M52 52 V 16 L 32 36" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Punto de union (conexion / nodo) -->
  <circle cx="32" cy="36" r="4" fill="#3b82f6"/>
</svg>
