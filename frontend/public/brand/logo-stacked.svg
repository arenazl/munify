<?xml version="1.0" encoding="UTF-8"?>
<!--
  Munify — version stacked (simbolo arriba + wordmark abajo).
  Para PWA splash, login, pantallas de carga.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Mark centrado arriba -->
  <g transform="translate(68 24)">
    <path d="M12 52 V 16 L 32 36" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M52 52 V 16 L 32 36" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="36" r="4" fill="#3b82f6"/>
  </g>
  <!-- Wordmark -->
  <text x="100" y="148" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="44" font-weight="700" letter-spacing="-1.5"
        fill="#3b82f6">Munify</text>
</svg>
