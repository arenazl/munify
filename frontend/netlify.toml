[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Proxy same-origin al backend (Cloud Run). El front pega a /api, /static y
# /uploads relativos → sin URL absoluta en el bundle (sin secrets scanning) y
# sin CORS. DEBEN ir ANTES del catch-all /* del SPA.
[[redirects]]
  from = "/api/*"
  to = "https://munify-api-vmpxsxe7ra-rj.a.run.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/static/*"
  to = "https://munify-api-vmpxsxe7ra-rj.a.run.app/static/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://munify-api-vmpxsxe7ra-rj.a.run.app/uploads/:splat"
  status = 200
  force = true

# Redirects para SPA (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache para assets estaticos (content-hash en el nombre → immutable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# El Service Worker y el HTML NUNCA se cachean → el deploy nuevo se ve sin
# malabares (ni incognito ni hard-refresh).
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
