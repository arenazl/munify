[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Proxy al backend: se GENERA en el build (scripts/gen-redirects.mjs) en dist/_redirects
# desde BACKEND_ORIGIN, por ambiente. NADA de host hardcodeado aca — eso causaba el leak
# qa->prod. Netlify procesa _redirects ANTES que netlify.toml, asi que el proxy vive en
# el archivo generado (junto con su propio catch-all SPA).

# SPA fallback (React Router) — respaldo; el _redirects generado ya trae su catch-all.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache para assets estaticos (content-hash en el nombre → immutable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# El Service Worker y el HTML NUNCA se cachean → el deploy nuevo se ve sin
# malabares (ni incognito ni hard-refresh).
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
